<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParkRunners Web Engine</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f3f4f6; font-family: sans-serif; }
        .navbar-custom { background-color: #111827; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark navbar-custom py-3 shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">🚘 ParkRunners Web Portal</a>
            {% if user.is_authenticated %}
                <span class="navbar-text text-success fw-bold">🟢 Session: {{ user.username }}</span>
            {% endif %}
        </div>
    </nav>
    <div class="container my-5">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
